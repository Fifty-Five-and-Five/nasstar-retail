<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Returns Processor</title>
<link rel="icon" type="image/svg+xml" href="parcels/plain.svg">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  color-scheme: light;
  --page-bg: #f4f1ea;
  --panel-bg: rgba(255,255,255,0.72);
  --panel-border: rgba(25, 31, 38, 0.10);
  --frame-shadow: 0 28px 80px rgba(25, 31, 38, 0.16);
  --ink: #1d232b;
  --muted: #6f7985;
}
body {
  min-height: 100vh;
  margin: 0;
  overflow: hidden;
  background:
    radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 34%),
    radial-gradient(circle at bottom right, rgba(64, 154, 173, 0.10), transparent 28%),
    linear-gradient(180deg, #f8f5ef 0%, var(--page-bg) 100%);
  font-family: 'Outfit', sans-serif;
  color: var(--ink);
}
#gc {
  display: block;
  width: 100vw;
  height: 100vh;
  background: transparent;
}
@media (max-width: 900px) {
  #gc { width: 100vw; height: 100vh; }
}
</style>
</head>
<body>
<canvas id="gc" width="1000" height="620"></canvas>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════
//  LAYOUT CONSTANTS
// ═══════════════════════════════════════════════════════════

const CW = 1000, CH = 620;

// Package size
const PW = 32, PH = 28;

// Belt visual thickness (half above/below centre)
const BH = 22;

// ── Y centres ───────────────────────────────────────────────
const AY  = 155;   // Belt A
const BY  = 475;   // Belt B
const DY  = 315;   // Belt D / pivot

// ── X boundaries (packages spawn right, move LEFT) ──────────
const SPAWN_X   = 990;
const AB_END_X  = 750;   // left end of A/B

// C bridge: short square belt that moves between AY and BY,
// bridging A or B belt to the fixed merger arm on that side
const MERGE_X   = 600;
const ARM_START_X = 658;          // fixed visible arm entry
const C_LEN     = 50;
const C_R_X     = 729;            // right end of C  (21 px gap from AB_END_X)
const C_L_X     = C_R_X - C_LEN;  // left end of C  (679)
const C_L_GAP   = C_L_X - ARM_START_X;

// Fixed merger arms: L-shaped belts with rounded corners
// Top arm: (C_L_X, AY) → right-angle at (MERGE_X, AY) → (MERGE_X, DY)
// Bot arm: (C_L_X, BY) → right-angle at (MERGE_X, BY) → (MERGE_X, DY)
const ARM_H_LEN = ARM_START_X - MERGE_X;    // horizontal leg starts at visible arm entry
const ARM_V_LEN = DY - AY;                  // vertical leg   = 160 px  (same for B)
const ARM_LEN   = ARM_H_LEN + ARM_V_LEN;    // total path length = 232 px

const PRED_R_X  = MERGE_X;   // 600
const PRED_L_X  = 520;        // PRED length = 80 px  (short visual connector)
const PRED_LEN  = PRED_R_X - PRED_L_X;

const D_R_X     = PRED_L_X;  // 520
const D_L_X     = 340;        // D len = 180 px  (longer — more reaction time)
const D_LEN     = D_R_X - D_L_X;

// ── Pivot / chute ────────────────────────────────────────────
const PX = 300, PY = DY;   // E/F pivot centre — more central, longer exit conveyors
const F_LEN = 120;          // chute arm (px)
const F_GAP = 18;           // gap between F tip and exit belt

// F tip positions for each exit
const G_TIP_Y = PY - F_LEN;          // 195
const H_TIP_X = PX - F_LEN;          // 180
const I_TIP_Y = PY + F_LEN;          // 435

// Exit belt entry (past the gap)
const G_ENTRY_Y = G_TIP_Y - F_GAP;   // 177
const H_ENTRY_X = H_TIP_X - F_GAP;   // 162
const I_ENTRY_Y = I_TIP_Y + F_GAP;   // 453

// Danger zone: last 15% of A/B belt
const AB_LEN    = SPAWN_X - AB_END_X; // 240
const WARN_DIST = AB_LEN * 0.15;       // 36 px

// ═══════════════════════════════════════════════════════════
//  TIMING CONSTANTS
// ═══════════════════════════════════════════════════════════

const D_PROC_TIME  = 1.8;    // fixed D processing time (s)
const D_SPEED      = D_LEN / D_PROC_TIME;  // ~191 px/s (independent of belt speed)

const ROT_CD_TIME  = 0.16;   // Z/X rotation cooldown (s)
const PL_CD_TIME   = 0.12;   // P/L cooldown (s)

// Belt speed ramp
const SPD_S = 55, SPD_E = 110;    // px/s start → end (much gentler start)
const GAME_DUR = 300;              // 5 min in seconds

// Spawn interval ramp
const SPAWN_AVG_S = 5.0,  SPAWN_AVG_E = 1.6;   // very slow start, builds up
const SPAWN_MIN_S = 2.5,  SPAWN_MIN_E = 0.9;   // hard minimum gap

// Tutorial pause when first item reaches E/F
const TUT_PAUSE = 0.6;

// Number of items that get hints
const HINT_LIMIT = 5;

// ═══════════════════════════════════════════════════════════
//  COLOURS
// ═══════════════════════════════════════════════════════════

const CLR = {
  bg:        '#ece6dc',
  bgSoft:    '#f6f2ea',
  floorGrid: 'rgba(29,35,43,0.04)',
  structure: '#27303a',
  structure2:'#4e5864',
  track:     '#313b45',
  trackSoft: '#87909a',
  beltA:     '#313b45',
  beltB:     '#313b45',
  beltC:     '#3a4652',
  beltD:     '#202933',
  tunnelBg:  '#e1d8cb',
  pkgA:      '#3f99ad',
  pkgB:      '#3f99ad',
  G:         '#3f99ad',
  H:         '#5d9d74',
  I:         '#cb6a5c',
  beltG:     '#3f99ad',
  beltH:     '#cb6a5c',
  beltI:     '#5d9d74',
  pivot:     '#202933',
  pivotSide: 'rgba(32,41,51,0.16)',
  pivotRim:  '#f4f1ea',
  text:      '#182028',
  dimText:   '#6e7680',
  gap:       '#ece6dc',
  warn:      '#cb6a5c',
  hintHL:    '#b9862f',
  hintBg:    'rgba(185,134,47,0.12)',
  hudBg:     'rgba(255,255,255,0.78)',
  hudLine:   'rgba(29,35,43,0.08)',
  flash:     'rgba(203,106,92,0.16)',
  correct:   'rgba(93,157,116,0.14)',
  overlay:   'rgba(244,241,234,0.84)',
};

const UI = {
  panelR: 24,
  cardR: 20,
  trackW: 30,
  branchW: 24,
  lineW: 2,
};

const RIGHT_EDGE_X = CW - UI.trackW / 2 - 2;

// ═══════════════════════════════════════════════════════════
//  MULBERRY32 PRNG
// ═══════════════════════════════════════════════════════════

let _seed = Date.now() >>> 0;
function rand() {
  _seed = (_seed + 0x6d2b79f5) >>> 0;
  let z = _seed;
  z = Math.imul(z ^ (z >>> 15), z | 1);
  z ^= z + Math.imul(z ^ (z >>> 7), z | 61);
  return ((z ^ (z >>> 14)) >>> 0) / 4294967296;
}

// ═══════════════════════════════════════════════════════════
//  GAME STATE
// ═══════════════════════════════════════════════════════════

let G;
const HIGH_SCORE_KEY = 'nasstarHighScore';

function initState() {
  G = {
    phase:   'title',   // 'title' | 'playing' | 'gameover'
    paused:  false,
    lives:   3,
    score:   0,
    bestScore: readHighScore(),
    time:    0,

    // Controls
    cAlign:  'A',       // 'A' | 'B'
    pivot:   'G',       // 'G' | 'H' | 'I'
    rotCD:   0,
    plCD:    0,

    // Entities
    pkgs:    [],        // packages on A, B, C belts
    dItems:  [],        // packages inside D tunnel
    fItem:   null,      // item currently in F chute (one at a time)
    exits:   [],        // items on G/H/I exit belts

    // Spawn
    spawnAt:   2.5,
    lastSpawn: -99,
    streakA:   0,
    streakB:   0,

    // Output type
    rStreak:     0,     // consecutive Restock streak
    nProcessed:  0,     // total items that entered D

    // Tutorial state
    tutState:      'waitFirstPkg',  // 'waitFirstPkg'|'waitProcessed'|'tutPause'|'done'
    tutPauseT:     0,
    tutFirstSpawned: false,

    // Visual effects
    lifeFlash:   0,
    lifeLostIndex: -1,
    lifeNoticeT: 0,
    lifeNoticeText: '',
    scoreFlash:  0,

    // Presentation state
    cBridgeY:    AY,
    cBridgeTargetY: AY,
    pivotAngle:  -Math.PI / 2,
    pivotTargetAngle: -Math.PI / 2,

    uid: 1,
  };
}

function readHighScore() {
  try {
    const raw = window.localStorage.getItem(HIGH_SCORE_KEY);
    const parsed = Number(raw);
    return Number.isFinite(parsed) && parsed >= 0 ? Math.floor(parsed) : 0;
  } catch {
    return 0;
  }
}

function writeHighScore(score) {
  try {
    window.localStorage.setItem(HIGH_SCORE_KEY, String(score));
  } catch {}
}

function commitHighScore(score) {
  if (score > G.bestScore) {
    G.bestScore = score;
    writeHighScore(score);
  }
}

// ═══════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function easeInOut(t) { return t * t * (3 - 2 * t); }
function smoothTo(current, target, rate, dt) {
  return lerp(current, target, 1 - Math.exp(-rate * dt));
}
function angleForPivot(pivot) {
  if (pivot === 'G') return -Math.PI / 2;
  if (pivot === 'H') return Math.PI;
  return Math.PI / 2;
}
function shortestAngleDelta(from, to) {
  let delta = (to - from + Math.PI) % (Math.PI * 2);
  if (delta < 0) delta += Math.PI * 2;
  return delta - Math.PI;
}
function smoothAngle(current, target, rate, dt) {
  return current + shortestAngleDelta(current, target) * (1 - Math.exp(-rate * dt));
}

// Position along L-shaped merger arm (t = 0→1): horizontal then vertical
function getArmPoint(src, t) {
  const fromY = src === 'A' ? AY : BY;
  const tH = ARM_H_LEN / ARM_LEN;   // fraction of path that is horizontal
  if (t <= tH) {
    return { x: lerp(ARM_START_X, MERGE_X, t / tH), y: fromY };
  } else {
    return { x: MERGE_X, y: lerp(fromY, DY, (t - tH) / (1 - tH)) };
  }
}

function ramp() { return clamp(G.time / GAME_DUR, 0, 1); }
function beltSpeed()  { return lerp(SPD_S, SPD_E, ramp()); }
function spawnAvg()   { return lerp(SPAWN_AVG_S, SPAWN_AVG_E, ramp()); }
function spawnMin()   { return lerp(SPAWN_MIN_S, SPAWN_MIN_E, ramp()); }
function fTravelTime(){ return F_LEN / beltSpeed(); }

// ═══════════════════════════════════════════════════════════
//  SPAWN  (weighted, streak-limited)
// ═══════════════════════════════════════════════════════════

function chooseLane() {
  let wA = (G.streakA >= 4) ? 0 : 4;
  let wB = (G.streakB >= 4) ? 0 : 5;
  const r = rand() * (wA + wB);
  return r < wA ? 'A' : 'B';
}

function chooseType() {
  let wR = (G.rStreak >= 4) ? 0 : 70;
  let wP = 10, wC = 20;
  const total = wR + wP + wC;
  const r = rand() * total;
  if (r < wR) return 'Restock';
  if (r < wR + wP) return 'Repair';
  return 'Recycle';
}

const TYPE_META = {
  Restock: { exit: 'G', color: CLR.G, shape: 'circle' },
  Repair:  { exit: 'H', color: CLR.I, shape: 'square' },
  Recycle: { exit: 'I', color: CLR.H, shape: 'triangle' },
};

const PARCEL_ASSET_PATHS = {
  plain: 'parcels/plain.svg',
  Restock: 'parcels/restock.svg',
  Repair: 'parcels/repair.svg',
  Recycle: 'parcels/recycle.svg',
};

const PARCEL_IMAGES = {};
for (const [key, src] of Object.entries(PARCEL_ASSET_PATHS)) {
  const img = new Image();
  img.src = src;
  PARCEL_IMAGES[key] = img;
}

const TITLE_LOGO = new Image();
TITLE_LOGO.src = 'parcels/return-logo.svg';

function scheduleSpawn() {
  const avg = spawnAvg();
  const interval = avg + (rand() - 0.5) * avg * 0.8;
  G.spawnAt = G.time + Math.max(spawnMin(), interval);
}

function doSpawn() {
  const lane = chooseLane();
  G.streakA = lane === 'A' ? G.streakA + 1 : 0;
  G.streakB = lane === 'B' ? G.streakB + 1 : 0;
  G.pkgs.push({
    id:    G.uid++,
    lane:  lane,
    src:   lane,
    x:     SPAWN_X,
    y:     lane === 'A' ? AY : BY,
    color: lane === 'A' ? CLR.pkgA : CLR.pkgB,
    onC:    false,
    onArm:  false,
    onPRED: false,
    transfer: null,
    armT:   0,
    warnT:  0,
  });
  G.lastSpawn = G.time;
}

function beginTransfer(entity, endX, endY, speed, nextState) {
  const dist = Math.hypot(endX - entity.x, endY - entity.y);
  entity.transfer = {
    startX: entity.x,
    startY: entity.y,
    endX,
    endY,
    t: 0,
    dur: Math.max(0.06, dist / Math.max(speed, 1)),
    nextState,
  };
}

// ═══════════════════════════════════════════════════════════
//  LIFE LOSS / SCORE
// ═══════════════════════════════════════════════════════════

function loseLife(msg) {
  const prevLives = G.lives;
  G.lives = Math.max(0, G.lives - 1);
  G.lifeFlash = 0.45;
  G.lifeLostIndex = Math.max(0, Math.min(2, prevLives - 1));
  G.lifeNoticeT = 0.9;
  G.lifeNoticeText = msg || 'Life Lost';
  if (G.tutState !== 'done') {
    G.tutState = 'done';
    G.spawnAt = G.time;
  }
  if (G.lives === 0) {
    commitHighScore(G.score);
    G.phase = 'gameover';
  }
}

function gainScore() {
  G.score++;
  G.scoreFlash = 0.45;
}

// ═══════════════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════════════

function update(dt) {
  if (G.phase === 'title' || G.phase === 'gameover' || G.paused) return;

  // Freeze during tutorial pause
  if (G.tutState === 'tutPause') {
    G.tutPauseT -= dt;
    if (G.tutPauseT <= 0) {
      G.tutState = 'done';
      scheduleSpawn();
    }
    return;
  }

  G.time += dt;
  if (G.rotCD > 0) G.rotCD = Math.max(0, G.rotCD - dt);
  if (G.plCD  > 0) G.plCD  = Math.max(0, G.plCD  - dt);
  if (G.lifeFlash > 0) G.lifeFlash -= dt;
  else G.lifeLostIndex = -1;
  if (G.lifeNoticeT > 0) G.lifeNoticeT -= dt;
  if (G.scoreFlash > 0) G.scoreFlash -= dt;
  G.cBridgeY = smoothTo(G.cBridgeY, G.cBridgeTargetY, 18, dt);
  G.pivotAngle = smoothAngle(G.pivotAngle, G.pivotTargetAngle, 20, dt);

  const spd = beltSpeed();

  // ── Spawn ──────────────────────────────────────────────────
  if (G.tutState === 'waitFirstPkg') {
    // Tutorial: spawn exactly 1 package then wait
    if (!G.tutFirstSpawned) {
      doSpawn();
      G.tutFirstSpawned = true;
      G.spawnAt = Infinity;
    }
  } else if (G.tutState === 'done' && G.time >= G.spawnAt) {
    doSpawn();
    scheduleSpawn();
  }

  // ── Move packages on A/B/C belts ──────────────────────────
  const pkgRemove = new Set();

  for (const p of G.pkgs) {
    if (p.transfer) {
      p.transfer.t = Math.min(1, p.transfer.t + dt / p.transfer.dur);
      const et = easeInOut(p.transfer.t);
      p.x = lerp(p.transfer.startX, p.transfer.endX, et);
      p.y = lerp(p.transfer.startY, p.transfer.endY, et);
      if (p.transfer.t >= 1) {
        const nextState = p.transfer.nextState;
        p.transfer = null;
        if (nextState === 'onC') {
          p.lane = 'C';
          p.onC = true;
          p.warn = false;
          p.warnT = 0;
        } else if (nextState === 'onArm') {
          p.onArm = true;
          p.armT = 0;
        }
      }
    } else if (p.onPRED) {
      // ── Package on fixed PRED belt (at DY): move left toward D ──
      p.x -= spd * dt;
      if (p.x + PW / 2 <= PRED_L_X) {
        // Reached PRED left end → enter D tunnel
        const type = chooseType();
        G.rStreak = type === 'Restock' ? G.rStreak + 1 : 0;
        const meta = TYPE_META[type];
        G.nProcessed++;
        const hint = G.nProcessed <= HINT_LIMIT;
        G.dItems.push({
          id:     G.uid++,
          type,
          targetExit: meta.exit,
          color:      meta.color,
          elapsed:    0,
          hint,
        });
        pkgRemove.add(p.id);

        if (G.tutState === 'waitFirstPkg') {
          G.tutState = 'waitProcessed';
        }
      }
    } else if (p.onArm) {
      // ── Package on diagonal merger arm: lerp from C_L_X/srcY → MERGE_X/DY ──
      p.armT = Math.min(1, p.armT + spd * dt / ARM_LEN);
      const ap = getArmPoint(p.src, p.armT);
      p.x = ap.x;
      p.y = ap.y;
      if (p.armT >= 1) {
        p.onArm  = false;
        p.onPRED = true;
        p.x      = PRED_R_X;
        p.y      = DY;
      }
    } else if (p.onC) {
      // ── Package on C bridge belt: move left toward merger arm ────
      p.x -= spd * dt;
      if (p.x + PW / 2 <= C_L_X) {
        p.onC = false;
        beginTransfer(p, ARM_START_X, p.y, spd * 1.05, 'onArm');
      }
    } else {
      // ── Package on A or B belt: move left ───────────────
      p.x -= spd * dt;

      // Warning flash
      const distToEnd = p.x - AB_END_X;
      p.warn = distToEnd < WARN_DIST + PW / 2;
      if (p.warn) p.warnT += dt; else p.warnT = 0;

      // Transfer / fall at AB_END_X
      if (p.x - PW / 2 <= AB_END_X) {
        const cY = G.cAlign === 'A' ? AY : BY;
        if (cY === p.y) {
          // Aligned → enter C bridge belt
          beginTransfer(p, C_R_X, cY, spd * 1.1, 'onC');
        } else {
          // Not aligned → fall
          loseLife('MISSED!');
          pkgRemove.add(p.id);
        }
      }
    }
  }
  G.pkgs = G.pkgs.filter(p => !pkgRemove.has(p.id));

  // ── Move items in D tunnel ─────────────────────────────────
  for (const item of G.dItems) {
    item.elapsed += dt;
    // Visual x position (lerp from D right to D left)
    const prog = Math.min(item.elapsed / D_PROC_TIME, 1);
    item.x = lerp(D_R_X - PW / 2, D_L_X + PW / 2, prog);
  }

  // Items ready to exit D (elapsed >= proc time AND F is free)
  if (G.fItem === null && G.dItems.length > 0) {
    // Check first item in queue
    const first = G.dItems[0];
    if (first.elapsed >= D_PROC_TIME) {
      G.dItems.shift();
      G.fItem = {
        id:         first.id,
        type:       first.type,
        targetExit: first.targetExit,
        color:      first.color,
        hint:       first.hint,
        introT:     0,
        introDur:   Math.max(0.08, Math.hypot(PX - (D_L_X + PW / 2), PY - DY) / Math.max(spd * 1.1, 1)),
        progress:   0,   // 0→1 along F chute
      };
      if (G.tutState === 'waitProcessed') {
        G.tutState = 'done';
        scheduleSpawn();
      }
    }
  }

  // ── Move item in F chute ───────────────────────────────────
  if (G.fItem) {
    if (G.fItem.introT < 1) {
      G.fItem.introT = Math.min(1, G.fItem.introT + dt / G.fItem.introDur);
    } else {
      const tTime = fTravelTime();
      G.fItem.progress = Math.min(1, G.fItem.progress + dt / tTime);
    }
    if (G.fItem.introT >= 1 && G.fItem.progress >= 1) {
      // Item exits F → enter exit belt (follow current pivot direction)
      const exit = G.pivot;
      const fi = G.fItem;
      G.fItem = null;

      let ex, ey;
      if (exit === 'G') { ex = PX;           ey = G_ENTRY_Y; }
      else if (exit === 'H') { ex = H_ENTRY_X;   ey = PY; }
      else                   { ex = PX;           ey = I_ENTRY_Y; }

      G.exits.push({
        id: G.uid++,
        type:       fi.type,
        targetExit: fi.targetExit,
        color:      fi.color,
        exit,
        x: PX + Math.cos(G.pivotAngle) * F_LEN,
        y: PY + Math.sin(G.pivotAngle) * F_LEN,
        transfer: {
          startX: PX + Math.cos(G.pivotAngle) * F_LEN,
          startY: PY + Math.sin(G.pivotAngle) * F_LEN,
          endX: ex,
          endY: ey,
          t: 0,
          dur: Math.max(0.06, Math.hypot(ex - (PX + Math.cos(G.pivotAngle) * F_LEN), ey - (PY + Math.sin(G.pivotAngle) * F_LEN)) / Math.max(spd * 1.15, 1)),
        },
      });
    }
  }

  // ── Move exit belt items ───────────────────────────────────
  const exitRemove = new Set();
  for (const item of G.exits) {
    if (item.transfer) {
      item.transfer.t = Math.min(1, item.transfer.t + dt / item.transfer.dur);
      const et = easeInOut(item.transfer.t);
      item.x = lerp(item.transfer.startX, item.transfer.endX, et);
      item.y = lerp(item.transfer.startY, item.transfer.endY, et);
      if (item.transfer.t >= 1) item.transfer = null;
    } else if (item.exit === 'G') {
      item.y -= spd * dt;
      if (item.y + PH < 0) {
        if (item.exit === item.targetExit) gainScore();
        else loseLife('WRONG EXIT!');
        exitRemove.add(item.id);
      }
    } else if (item.exit === 'H') {
      item.x -= spd * dt;
      if (item.x + PW < 0) {
        if (item.exit === item.targetExit) gainScore();
        else loseLife('WRONG EXIT!');
        exitRemove.add(item.id);
      }
    } else {
      item.y += spd * dt;
      if (item.y > CH) {
        if (item.exit === item.targetExit) gainScore();
        else loseLife('WRONG EXIT!');
        exitRemove.add(item.id);
      }
    }
  }
  G.exits = G.exits.filter(i => !exitRemove.has(i.id));
}

const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
let DPR = 1;
let VIEW = { scale: 1, offsetX: 0, offsetY: 0 };

function setupCanvas() {
  const rect = { width: window.innerWidth, height: window.innerHeight };
  DPR = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
  canvas.width = Math.round(rect.width * DPR);
  canvas.height = Math.round(rect.height * DPR);
  const scale = Math.min(rect.width / CW, rect.height / CH);
  VIEW = {
    scale,
    offsetX: (rect.width - CW * scale) / 2,
    offsetY: (rect.height - CH * scale) / 2,
  };
  ctx.setTransform(DPR * scale, 0, 0, DPR * scale, DPR * VIEW.offsetX, DPR * VIEW.offsetY);
}

window.addEventListener('resize', setupCanvas);

function fillRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function strokeRect(x, y, w, h, color, lw) {
  ctx.strokeStyle = color;
  ctx.lineWidth = lw || 1;
  ctx.strokeRect(x, y, w, h);
}

function text(str, x, y, color, size, align, bold, alpha) {
  ctx.fillStyle = color;
  ctx.font = `${bold ? 700 : 500} ${size || 12}px "Outfit", sans-serif`;
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = alpha === undefined ? 1 : alpha;
  ctx.fillText(str, x, y);
  ctx.globalAlpha = 1;
}

function drawWrappedText(str, x, y, maxWidth, lineHeight, color, size, align, bold, alpha) {
  ctx.save();
  ctx.fillStyle = color;
  ctx.font = `${bold ? 700 : 500} ${size || 12}px "Outfit", sans-serif`;
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'middle';
  ctx.globalAlpha = alpha === undefined ? 1 : alpha;

  const words = str.split(/\s+/);
  const lines = [];
  let current = words[0] || '';
  for (let i = 1; i < words.length; i++) {
    const candidate = `${current} ${words[i]}`;
    if (ctx.measureText(candidate).width <= maxWidth) current = candidate;
    else {
      lines.push(current);
      current = words[i];
    }
  }
  if (current) lines.push(current);

  const startY = y - ((lines.length - 1) * lineHeight) / 2;
  for (let i = 0; i < lines.length; i++) {
    ctx.fillText(lines[i], x, startY + i * lineHeight);
  }
  ctx.restore();
}

function drawSticker(cx, cy, type) {
  const meta = TYPE_META[type];
  if (!meta) return;

  ctx.save();
  ctx.fillStyle = meta.color;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 3;
  ctx.lineJoin = 'round';

  if (meta.shape === 'circle') {
    ctx.beginPath();
    ctx.arc(cx, cy, 14, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
  } else if (meta.shape === 'square') {
    ctx.beginPath();
    ctx.roundRect(cx - 14, cy - 14, 28, 28, 6);
    ctx.fill();
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.moveTo(cx, cy - 16);
    ctx.lineTo(cx - 16, cy + 12);
    ctx.lineTo(cx + 16, cy + 12);
    ctx.closePath();
    ctx.fill();
    ctx.stroke();
  }
  ctx.restore();
}

function drawPackage(cx, cy, color, flashing, flashT, stickerType) {
  const assetKey = stickerType || 'plain';
  const img = PARCEL_IMAGES[assetKey];
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.save();
    const aspect = img.naturalWidth / img.naturalHeight;
    const targetH = PH + 8;
    const targetW = targetH * aspect;
    const x = cx - targetW / 2;
    const y = cy - targetH / 2;
    const pulse = flashing ? 0.45 + 0.35 * Math.abs(Math.sin(flashT * 8)) : 0.12;
    ctx.shadowColor = flashing ? `rgba(203,106,92,${pulse})` : 'rgba(29,35,43,0.10)';
    ctx.shadowBlur = flashing ? 20 : 10;
    ctx.drawImage(img, x, y, targetW, targetH);
    ctx.shadowBlur = 0;
    ctx.restore();
    return;
  }

  const x = cx - PW / 2;
  const y = cy - PH / 2;
  const pulse = flashing ? 0.45 + 0.35 * Math.abs(Math.sin(flashT * 8)) : 0.12;

  ctx.save();
  ctx.shadowColor = flashing ? `rgba(203,106,92,${pulse})` : 'rgba(29,35,43,0.10)';
  ctx.shadowBlur = flashing ? 20 : 10;
  ctx.beginPath();
  ctx.roundRect(x, y, PW, PH, 10);
  ctx.fillStyle = '#dfbc97';
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.roundRect(x + PW / 2 - 4, y + 2, 8, PH - 4, 4);
  ctx.fillStyle = '#b59371';
  ctx.fill();

  ctx.beginPath();
  ctx.roundRect(x, y, PW, PH, 10);
  ctx.strokeStyle = 'rgba(24,32,40,0.10)';
  ctx.lineWidth = 1;
  ctx.stroke();

  if (stickerType) drawSticker(cx, cy, stickerType);
  ctx.restore();
}

function drawBeltH(x1, x2, cy, color) {
  const width = UI.trackW;
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.strokeStyle = 'rgba(135,144,154,0.7)';
  ctx.lineWidth = width + 14;
  ctx.beginPath();
  ctx.moveTo(x1, cy);
  ctx.lineTo(x2, cy);
  ctx.stroke();

  ctx.lineCap = 'butt';
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(x1, cy);
  ctx.lineTo(x2, cy);
  ctx.stroke();
  ctx.restore();

  drawMovingRollersLine(x1 + 18, cy, x2 - 18, cy, 'right');
}

function drawBeltV(cx, y1, y2, color, dir) {
  const width = UI.trackW;
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.strokeStyle = 'rgba(135,144,154,0.7)';
  ctx.lineWidth = width + 14;
  ctx.beginPath();
  ctx.moveTo(cx, y1);
  ctx.lineTo(cx, y2);
  ctx.stroke();

  ctx.lineCap = 'butt';
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(cx, y1);
  ctx.lineTo(cx, y2);
  ctx.stroke();
  ctx.restore();

  drawMovingRollersLine(cx, y1 + 18, cx, y2 - 18, dir < 0 ? 'down' : 'up');
}

function drawRailPath(points, color, width, flow) {
  ctx.save();
  ctx.lineCap = 'butt';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(135,144,154,0.7)';
  ctx.lineWidth = width + 14;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.stroke();

  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.beginPath();
  ctx.moveTo(points[0][0], points[0][1]);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
  ctx.stroke();
  ctx.restore();

  drawMovingRollersPath(points, flow || 'forward');
}

function drawMovingRollersLine(x1, y1, x2, y2, flow) {
  const len = Math.hypot(x2 - x1, y2 - y1);
  const spacing = 28;
  const radius = 4.5;
  const nx = (x2 - x1) / len;
  const ny = (y2 - y1) / len;
  const alongForward = (flow === 'right' || flow === 'down');
  const travel = (G.time * beltSpeed() * 0.45) % spacing;
  const start = alongForward ? spacing - travel : spacing + travel;

  for (let d = start; d < len - spacing * 0.35; d += spacing) {
    const px = x1 + nx * d;
    const py = y1 + ny * d;
    drawNode(px, py, radius, 'rgba(247,244,237,0.62)', 'rgba(24,32,40,0.10)');
  }
}

function drawMovingRollersPath(points, flow) {
  const segments = [];
  let total = 0;
  for (let i = 1; i < points.length; i++) {
    const [x1, y1] = points[i - 1];
    const [x2, y2] = points[i];
    const len = Math.hypot(x2 - x1, y2 - y1);
    segments.push({ x1, y1, x2, y2, len, start: total });
    total += len;
  }

  const spacing = 28;
  const alongForward = flow !== 'reverse';
  const travel = (G.time * beltSpeed() * 0.42) % spacing;
  const start = alongForward ? spacing - travel : spacing + travel;

  for (let d = start; d < total - spacing * 0.35; d += spacing) {
    const dist = d;
    const seg = segments.find(s => dist <= s.start + s.len);
    if (!seg) continue;
    const local = dist - seg.start;
    const nx = (seg.x2 - seg.x1) / seg.len;
    const ny = (seg.y2 - seg.y1) / seg.len;
    drawNode(seg.x1 + nx * local, seg.y1 + ny * local, 4.5, 'rgba(247,244,237,0.62)', 'rgba(24,32,40,0.10)');
  }
}

function drawNode(x, y, r, fill, stroke) {
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
}

function drawPanel(x, y, w, h, radius, fill, stroke) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, radius);
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawFlowArrow(x, y, dir) {
  ctx.save();
  ctx.translate(x, y);
  if (dir === 'left') ctx.rotate(Math.PI);
  if (dir === 'up') ctx.rotate(-Math.PI / 2);
  if (dir === 'down') ctx.rotate(Math.PI / 2);
  ctx.fillStyle = 'rgba(24,32,40,0.24)';
  ctx.beginPath();
  ctx.moveTo(-6, -5);
  ctx.lineTo(6, 0);
  ctx.lineTo(-6, 5);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawTransferHousingH(cx, cy, width, height) {
  ctx.save();
  const outerW = width + 8;
  const outerH = height + 6;
  const jawW = Math.max(10, Math.min(14, outerW * 0.24));
  const jawH = outerH;
  const gapW = Math.max(12, outerW - jawW * 2 - 10);

  ctx.shadowColor = 'rgba(24,32,40,0.07)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.roundRect(cx - outerW / 2, cy - outerH / 2, jawW, jawH, 8);
  ctx.roundRect(cx + outerW / 2 - jawW, cy - outerH / 2, jawW, jawH, 8);
  ctx.fillStyle = '#9a9ba1';
  ctx.fill();
  ctx.shadowBlur = 0;

  ctx.beginPath();
  ctx.roundRect(cx - outerW / 2 + 2, cy - outerH / 2 + 2, jawW - 4, jawH - 4, 7);
  ctx.roundRect(cx + outerW / 2 - jawW + 2, cy - outerH / 2 + 2, jawW - 4, jawH - 4, 7);
  ctx.fillStyle = '#bfc1c6';
  ctx.fill();

  ctx.beginPath();
  ctx.roundRect(cx - gapW / 2, cy - (height - 6) / 2, gapW, height - 6, 7);
  ctx.fillStyle = '#f4efe7';
  ctx.fill();

  ctx.beginPath();
  ctx.roundRect(cx - gapW / 2 + 2, cy - (height - 6) / 2 + 2, gapW - 4, 3, 2);
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.fill();

  ctx.beginPath();
  ctx.roundRect(cx - outerW / 2, cy - outerH / 2, jawW, jawH, 8);
  ctx.roundRect(cx + outerW / 2 - jawW, cy - outerH / 2, jawW, jawH, 8);

function drawBridgeModule(x1, x2, cy) {
  const bodyH = 40;
  const postW = 8;
  const postH = 34;
  const postOffset = 11;
  const bodyY = cy - bodyH / 2;
  const bodyW = x2 - x1;

  fillRect(x1, bodyY, bodyW, bodyH, CLR.beltC);

  ctx.strokeStyle = 'rgba(255,255,255,0.26)';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x1 + 10, cy);
  ctx.lineTo(x2 - 10, cy);
  ctx.stroke();

  for (const side of [-1, 1]) {
    const edgeX = side < 0 ? x1 : x2;
    const postX = edgeX + side * postOffset;

    ctx.strokeStyle = '#b8b9bf';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(edgeX, cy - 8);
    ctx.lineTo(postX, cy - 8);
    ctx.moveTo(edgeX, cy + 8);
    ctx.lineTo(postX, cy + 8);
    ctx.stroke();

    ctx.beginPath();
    ctx.roundRect(postX - postW / 2, cy - postH / 2, postW, postH, 3);
    ctx.fillStyle = '#a7a9b0';
    ctx.fill();

    ctx.beginPath();
    ctx.roundRect(postX - postW / 2 + 2, cy - postH / 2 + 2, postW - 4, postH - 4, 2);
    ctx.fillStyle = '#c2c4ca';
    ctx.fill();
  }

  drawNode((x1 + x2) / 2, cy, 12, '#f7f4ed', 'rgba(24,32,40,0.12)');
}

function getProcessorScanColor() {
  if (G.dItems.length > 0) return TYPE_META[G.dItems[0].type]?.color || CLR.G;
  if (G.fItem) return TYPE_META[G.fItem.type]?.color || CLR.G;
  return 'rgba(99,122,145,0.45)';
}

function drawProcessorEffect(scanColor) {
  const centerX = D_L_X + D_LEN / 2;
  const sweepT = (Math.sin(G.time * 4.6) + 1) / 2;
  const sweepX = lerp(D_L_X + 18, D_L_X + D_LEN - 18, sweepT);
  const pulse = 0.5 + 0.5 * Math.sin(G.time * 5.2);
  const tunnelX = D_L_X + 4;
  const tunnelY = DY - 18;
  const tunnelW = D_LEN - 8;
  const tunnelH = 36;

  ctx.save();
  ctx.beginPath();
  ctx.roundRect(tunnelX, tunnelY, tunnelW, tunnelH, 18);
  ctx.clip();

  const chamberGrad = ctx.createLinearGradient(D_L_X, 0, D_R_X, 0);
  chamberGrad.addColorStop(0, 'rgba(255,255,255,0)');
  chamberGrad.addColorStop(0.2, scanColor);
  chamberGrad.addColorStop(0.5, scanColor);
  chamberGrad.addColorStop(0.8, scanColor);
  chamberGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.globalAlpha = 0.3 + pulse * 0.12;
  fillRect(tunnelX, tunnelY, tunnelW, tunnelH, chamberGrad);

  for (let i = 0; i < 6; i++) {
    const x = D_L_X + 24 + i * 28 + (G.time * 18 % 28);
    ctx.globalAlpha = 0.08;
    fillRect(x, tunnelY, 1.5, tunnelH, 'rgba(255,255,255,0.9)');
  }

  const beamGrad = ctx.createLinearGradient(sweepX - 28, 0, sweepX + 28, 0);
  beamGrad.addColorStop(0, 'rgba(255,255,255,0)');
  beamGrad.addColorStop(0.5, 'rgba(255,255,255,0.95)');
  beamGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.globalAlpha = 0.42;
  fillRect(sweepX - 28, tunnelY - 2, 56, tunnelH + 4, beamGrad);

  ctx.shadowColor = scanColor;
  ctx.shadowBlur = 24;
  ctx.globalAlpha = 0.8;
  fillRect(D_L_X + 16, DY - 2, D_LEN - 32, 4, scanColor);
  ctx.shadowBlur = 0;

  const orbitR = 52;
  for (let i = 0; i < 3; i++) {
    const a = G.time * 2.6 + i * (Math.PI * 2 / 3);
    const px = centerX + Math.cos(a) * orbitR;
    const py = DY + Math.sin(a * 1.6) * 8;
    drawNode(px, py, 2.5, 'rgba(255,255,255,0.75)');
  }

  ctx.globalAlpha = 0.45 + pulse * 0.25;
  ctx.strokeStyle = `rgba(255,255,255,${0.24 + pulse * 0.22})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.roundRect(tunnelX + 10, tunnelY + 8, tunnelW - 20, tunnelH - 16, 12);
  ctx.stroke();

  ctx.restore();
}

  drawFloorLabel(PX + 118, CH - 72, 'Recycle', TYPE_META.Recycle.color, 'center', 'Recycle');

  drawPanel(D_L_X - 6, DY - 28, D_LEN + 12, 56, 24, 'rgba(32,41,51,0.06)', 'rgba(24,32,40,0.08)');
  drawPanel(D_L_X, DY - 22, D_LEN, 44, 22, CLR.tunnelBg, 'rgba(24,32,40,0.10)');
  const scanColor = getProcessorScanColor();
  drawProcessorEffect(scanColor);
  text('Processor', D_L_X + D_LEN / 2, DY - 38, CLR.dimText, 12, 'center', true);

  drawBeltH(PRED_L_X, PRED_R_X, DY, CLR.beltC);

  drawBeltH(AB_END_X, RIGHT_EDGE_X, AY, CLR.beltA);
  drawBeltH(AB_END_X, RIGHT_EDGE_X, BY, CLR.beltB);
  drawFloorLabel((AB_END_X + SPAWN_X) / 2, AY - 34, 'Store Returns', CLR.dimText, 'center');
  drawFloorLabel((AB_END_X + SPAWN_X) / 2, BY + 38, 'Online Returns', CLR.dimText, 'center');

  drawMachineControls();
  drawMergerArms();
  drawPivot();

  for (const item of G.dItems) {
    const prog = Math.min(item.elapsed / D_PROC_TIME, 1);
    const ix = lerp(D_R_X - PW / 2, D_L_X + PW / 2, prog);
    drawPackage(ix, DY, item.color, false, 0, item.type);
  }

  if (G.fItem) {
    let fx, fy;
    if (G.fItem.introT < 1) {
      const intro = easeInOut(G.fItem.introT);
      fx = lerp(D_L_X + PW / 2, PX, intro);
      fy = lerp(DY, PY, intro);
    } else {
      const prog = G.fItem.progress;
      fx = PX + Math.cos(G.pivotAngle) * prog * F_LEN;
      fy = PY + Math.sin(G.pivotAngle) * prog * F_LEN;
    }
    drawPackage(fx, fy, G.fItem.color, false, 0, G.fItem.type);
  }

  for (const p of G.pkgs) {
    const py = p.transfer ? p.y : (p.onC ? G.cBridgeY : p.y);
    drawPackage(p.x, py, p.color, p.warn, p.warnT, null);
  }

  for (const item of G.exits) {
    drawPackage(item.x, item.y, item.color, false, 0, item.type);
  }

  drawJunctionCover();
}

function drawPivot() {
  const r = 30;
  const tipX = PX + Math.cos(G.pivotAngle) * F_LEN;
  const tipY = PY + Math.sin(G.pivotAngle) * F_LEN;
  ctx.save();
  ctx.strokeStyle = CLR.pivotSide;
  ctx.lineWidth = UI.branchW + 8;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(PX + 3, PY + 3);
  ctx.lineTo(tipX + 3, tipY + 3);
  ctx.stroke();

  ctx.strokeStyle = CLR.pivot;
  ctx.lineWidth = UI.branchW;
  ctx.beginPath();
  ctx.moveTo(PX, PY);
  ctx.lineTo(tipX, tipY);
  ctx.stroke();
  ctx.restore();
  drawMovingRollersPath([[PX, PY], [tipX, tipY]], 'reverse');

  if (G.pivot === 'G') {
    drawGapV(PX, G_TIP_Y, G_ENTRY_Y, BH + 12);
  } else if (G.pivot === 'H') {
    drawGap(H_TIP_X, H_ENTRY_X, PY, BH + 12);
  } else {
    drawGapV(PX, I_TIP_Y, I_ENTRY_Y, BH + 12);
  }
  drawTransferHousingTip(tipX, tipY, G.pivotAngle);

  drawNode(PX + 4, PY + 4, r + 2, CLR.pivotSide);
  drawNode(PX, PY, r, CLR.pivot, 'rgba(255,255,255,0.28)');
  drawNode(PX, PY, 10, '#f7f4ed', 'rgba(24,32,40,0.10)');

  ctx.save();
  ctx.translate(PX, PY);
  ctx.rotate(G.pivotAngle + Math.PI / 2);
  ctx.fillStyle = CLR.pivotRim;
  ctx.beginPath();
  ctx.moveTo(0, -16);
  ctx.lineTo(-8, 4);
  ctx.lineTo(8, 4);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  drawRailPath([[D_L_X, PY], [PX + r, PY]], CLR.beltD, 6, 'reverse');
}

// ═══════════════════════════════════════════════════════════
//  RENDER — HUD
// ═══════════════════════════════════════════════════════════

function renderHUD() {
  const navW = 520;
  const navX = (CW - navW) / 2;
  drawPanel(navX, 10, navW, 64, 38, 'rgba(255,255,255,0.92)', 'rgba(24,32,40,0.08)');
  text('Lives', navX + 16, 32, CLR.dimText, 11, 'left', true);
  if (G.lifeFlash > 0) {
    const lp = Math.max(0, G.lifeFlash / 0.45);
    ctx.save();
    ctx.globalAlpha = 0.12 + lp * 0.16;
    drawPanel(navX + 8, 22, 90, 38, 18, 'rgba(203,106,92,0.20)', 'rgba(203,106,92,0.22)');
    ctx.restore();
  }
  for (let i = 0; i < 3; i++) {
    const alive = i < G.lives;
    const hx = navX + 16 + i * 22;
    if (G.lifeFlash > 0 && i === G.lifeLostIndex) {
      const lp = Math.max(0, G.lifeFlash / 0.45);
      ctx.save();
      ctx.globalAlpha = 0.3 + lp * 0.35;
      ctx.strokeStyle = CLR.warn;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(hx + 7, 52, 11 + (1 - lp) * 4, 0, Math.PI * 2);
      ctx.stroke();
      ctx.restore();
    }
    drawNode(hx + 7, 52, 7, alive ? CLR.I : 'rgba(39,48,58,0.10)', alive ? 'rgba(255,255,255,0.7)' : null);
  }

  text('Score', CW / 2 - 108, 32, CLR.dimText, 11, 'left', true);
  const scorePulse = Math.max(0, G.scoreFlash / 0.45);
  const scoreSize = 24 + scorePulse * 5;
  const scoreColor = scorePulse > 0 ? CLR.hintHL : CLR.text;
  if (scorePulse > 0) {
    ctx.save();
    ctx.globalAlpha = 0.14 + scorePulse * 0.2;
    drawPanel(CW / 2 - 118, 36, 106, 28, 14, 'rgba(185,134,47,0.14)', 'rgba(185,134,47,0.10)');
    ctx.restore();
  }
  text(String(G.score).padStart(5, '0'), CW / 2 - 108, 53, scoreColor, scoreSize, 'left', true);
  if (scorePulse > 0) {
    text('+1', CW / 2 - 24, 38 - (1 - scorePulse) * 10, CLR.hintHL, 13, 'left', true, 0.55 + scorePulse * 0.45);
  }

  const elapsed = Math.floor(G.time);
  const mm = String(Math.floor(elapsed / 60)).padStart(2, '0');
  const ss = String(elapsed % 60).padStart(2, '0');
  text('Time', CW / 2 + 48, 32, CLR.dimText, 11, 'left', true);
  text(`${mm}:${ss}`, CW / 2 + 48, 53, CLR.text, 22, 'left', true);
}

function renderLifeNotice() {
  if (G.lifeNoticeT <= 0) return;

  const t = Math.max(0, G.lifeNoticeT / 0.9);
  const rise = (1 - t) * 10;
  const alpha = t < 0.2 ? t / 0.2 : 1;
  const glow = 0.18 + t * 0.16;
  const w = 240;
  const h = 88;
  const x = CW / 2 - w / 2;
  const y = CH / 2 - h / 2 - 26 - rise;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = 'rgba(203,106,92,0.18)';
  ctx.shadowBlur = 24;
  drawPanel(x, y, w, h, 24, 'rgba(255,248,245,0.94)', 'rgba(203,106,92,0.16)');
  ctx.shadowBlur = 0;

  drawPanel(x + 18, y + 18, 40, 40, 14, 'rgba(203,106,92,0.14)', 'rgba(203,106,92,0.08)');
  ctx.fillStyle = CLR.warn;
  ctx.beginPath();
  ctx.arc(x + 38, y + 38, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = `rgba(203,106,92,${glow})`;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x + 38, y + 38, 13, 0, Math.PI * 2);
  ctx.stroke();

  text('Life Lost', x + 74, y + 34, CLR.warn, 17, 'left', true);
  text(G.lifeNoticeText, x + 74, y + 54, CLR.dimText, 13, 'left', true, 0.95);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════

// ═══════════════════════════════════════════════════════════
//  RENDER — OVERLAY SCREENS
// ═══════════════════════════════════════════════════════════

function drawTitleLogo(cx, cy, maxW) {
  if (!TITLE_LOGO.complete || TITLE_LOGO.naturalWidth <= 0) return false;
  const aspect = TITLE_LOGO.naturalWidth / TITLE_LOGO.naturalHeight;
  const w = maxW;
  const h = w / aspect;
  ctx.save();
  ctx.shadowColor = 'rgba(24,32,40,0.06)';
  ctx.shadowBlur = 10;
  ctx.drawImage(TITLE_LOGO, cx - w / 2, cy - h / 2, w, h);
  ctx.shadowBlur = 0;
  ctx.restore();
  return true;
}

function renderTitle() {
  fillRect(0, 0, CW, CH, CLR.bg);
  fillRect(0, 0, CW, CH, 'rgba(255,255,255,0.35)');
  const TILE = 56;
  ctx.strokeStyle = CLR.floorGrid;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let gx = 0; gx <= CW; gx += TILE) { ctx.moveTo(gx, 0); ctx.lineTo(gx, CH); }
  for (let gy = 0; gy <= CH; gy += TILE) { ctx.moveTo(0, gy); ctx.lineTo(CW, gy); }
  ctx.stroke();

  ctx.globalAlpha = 0.40;
  drawBeltH(AB_END_X, SPAWN_X, AY, CLR.beltA);
  drawBeltH(AB_END_X, SPAWN_X, BY, CLR.beltB);
  drawBeltH(PRED_L_X, PRED_R_X, DY, CLR.beltC);
  drawBeltV(PX, 0, G_ENTRY_Y, CLR.beltG, -1);
  drawBeltH(0, H_ENTRY_X, PY, CLR.beltH);
  drawBeltV(PX, I_ENTRY_Y, CH, CLR.beltI, 1);
  drawBridgeModule(C_L_X, C_R_X, AY);
  drawRailPath([[C_L_X - C_L_GAP, AY], [MERGE_X, AY], [MERGE_X, DY]], CLR.beltC, UI.branchW, 'reverse');
  drawRailPath([[C_L_X - C_L_GAP, BY], [MERGE_X, BY], [MERGE_X, DY]], CLR.beltC, UI.branchW, 'reverse');
  drawTransferHousingTip(PX, PY - F_LEN, -Math.PI / 2);
  drawNode(PX, PY, 28, CLR.pivot, 'rgba(255,255,255,0.24)');
  ctx.globalAlpha = 1;

  const cardW = 520;
  const cardH = 272;
  const cardX = CW / 2 - cardW / 2;
  const cardY = CH / 2 - cardH / 2 + 4;
  drawPanel(cardX, cardY, cardW, cardH, 30, 'rgba(255,255,255,0.84)', 'rgba(24,32,40,0.08)');

  const logoDrawn = drawTitleLogo(CW / 2, cardY + 62, 220);
  if (!logoDrawn) {
    text('Returns Processor', CW / 2, cardY + 70, CLR.text, 34, 'center', true);
  }
  drawWrappedText(
    'Sort returned parcels through the processor and route them to the right destination.',
    CW / 2,
    cardY + 130,
    360,
    24,
    CLR.dimText,
    17,
    'center'
  );

  drawPanel(CW / 2 - 122, cardY + 188, 244, 34, 17, 'rgba(39,48,58,0.06)', 'rgba(24,32,40,0.08)');
  text('Press Any Key to Start', CW / 2, cardY + 205, CLR.hintHL, 14, 'center', true);
}

function renderGameOver() {
  fillRect(0, 0, CW, CH, CLR.overlay);
  drawPanel(CW / 2 - 220, CH / 2 - 112, 440, 224, 28, 'rgba(255,255,255,0.90)', 'rgba(24,32,40,0.08)');
  text('Game Over', CW / 2, CH / 2 - 46, CLR.I, 34, 'center', true);
  text(`Final score ${G.score}`, CW / 2, CH / 2, CLR.text, 20, 'center', true);
  text(`High Score ${String(G.bestScore).padStart(5, '0')}`, CW / 2, CH / 2 + 28, CLR.dimText, 14, 'center', true);

  const blink = Math.floor(performance.now() / 550) % 2 === 0;
  if (blink) text('PRESS ANY KEY TO RESTART', CW / 2, CH / 2 + 72, CLR.hintHL, 14, 'center', true);
}

function renderTutorialOverlay() {
  return;
}

// ═══════════════════════════════════════════════════════════
//  RENDER — PAUSE OVERLAY
// ═══════════════════════════════════════════════════════════

function renderPause() {
  fillRect(0, 0, CW, CH, CLR.overlay);
  drawPanel(CW / 2 - 180, CH / 2 - 78, 360, 156, 24, 'rgba(255,255,255,0.90)', 'rgba(24,32,40,0.08)');
  text('Paused', CW / 2, CH / 2 - 18, CLR.hintHL, 30, 'center', true);
  text('Esc to resume', CW / 2, CH / 2 + 30, CLR.dimText, 14, 'center', true);
}

// ═══════════════════════════════════════════════════════════
//  RENDER — MASTER
// ═══════════════════════════════════════════════════════════

function render() {
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
  ctx.setTransform(DPR * VIEW.scale, 0, 0, DPR * VIEW.scale, DPR * VIEW.offsetX, DPR * VIEW.offsetY);
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, CW, CH);
  ctx.clip();

  if (G.phase === 'title') {
    renderTitle();
    renderHUD();  // just for the time ticker on title
    ctx.restore();
    return;
  }

  renderField();
  renderHints();
  renderHUD();
  renderLifeNotice();

  if (G.phase === 'gameover') renderGameOver();
  if (G.phase === 'playing') {
    if (G.paused) renderPause();
    else renderTutorialOverlay();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════════════════════════

const KEYS = new Set();

document.addEventListener('keydown', e => {
  if (e.repeat) return;  // ignore browser key-repeat
  const k = e.key.toLowerCase();

  if (G.phase === 'title') {
    startGame();
    return;
  }

  if (G.phase === 'gameover') {
    initState();
    G.phase = 'playing';
    G.tutState = 'waitFirstPkg';
    G.cBridgeTargetY = AY;
    G.pivotTargetAngle = angleForPivot('G');
    return;
  }

  // Pause toggle (works during play and from pause)
  if (e.key === 'Escape' && G.phase === 'playing') {
    G.paused = !G.paused;
    return;
  }

  if (G.paused) return;   // ignore other keys while paused

  // During game
  switch (k) {
    case 'p':
      if (G.plCD <= 0 && G.cAlign !== 'A') {
        G.cAlign = 'A';
        G.cBridgeTargetY = AY;
        G.plCD = PL_CD_TIME;
      }
      break;
    case 'l':
      if (G.plCD <= 0 && G.cAlign !== 'B') {
        G.cAlign = 'B';
        G.cBridgeTargetY = BY;
        G.plCD = PL_CD_TIME;
      }
      break;
    case 'q':
      if (G.rotCD <= 0) {
        if (G.pivot === 'I') G.pivot = 'H';
        else if (G.pivot === 'H') G.pivot = 'G';
        else G.pivot = 'G';
        G.pivotTargetAngle = angleForPivot(G.pivot);
        G.rotCD = ROT_CD_TIME;
      }
      break;
    case 'a':
      if (G.rotCD <= 0) {
        if (G.pivot === 'G') G.pivot = 'H';
        else if (G.pivot === 'H') G.pivot = 'I';
        else G.pivot = 'I';
        G.pivotTargetAngle = angleForPivot(G.pivot);
        G.rotCD = ROT_CD_TIME;
      }
      break;
  }
});

function startGame() {
  initState();
  G.phase = 'playing';
  G.tutState = 'waitFirstPkg';
  G.cBridgeTargetY = AY;
  G.pivotTargetAngle = angleForPivot('G');
}

// ═══════════════════════════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════════════════════════

let lastTime = null;

function loop(ts) {
  if (lastTime === null) lastTime = ts;
  const dt = Math.min((ts - lastTime) / 1000, 0.05);  // cap at 50ms
  lastTime = ts;

  update(dt);
  render();

  requestAnimationFrame(loop);
}

// ── Boot ─────────────────────────────────────────────────
initState();
setupCanvas();
requestAnimationFrame(loop);
</script>
